<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="box" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="lid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fcd34d"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Toolbox body -->
  <rect x="106" y="230" width="300" height="160" rx="18" ry="18" fill="url(#box)"/>

  <!-- Toolbox lid -->
  <rect x="96" y="210" width="320" height="50" rx="14" ry="14" fill="url(#lid)"/>

  <!-- Handle -->
  <rect x="196" y="160" width="120" height="60" rx="16" ry="16" fill="none" stroke="#fcd34d" stroke-width="18"/>
  <!-- Mask out bottom of handle -->
  <rect x="196" y="210" width="120" height="30" fill="url(#lid)"/>

  <!-- Center latch -->
  <rect x="238" y="222" width="36" height="30" rx="6" fill="#d97706"/>
  <circle cx="256" cy="237" r="6" fill="#92400e"/>

  <!-- Tool peaking out — wrench left -->
  <g transform="translate(150, 140) rotate(-30, 30, 40)">
    <rect x="22" y="0" width="16" height="70" rx="4" fill="#e2e8f0"/>
    <circle cx="30" cy="8" r="14" fill="none" stroke="#e2e8f0" stroke-width="8"/>
  </g>

  <!-- Tool peaking out — screwdriver right -->
  <g transform="translate(310, 130) rotate(25, 20, 50)">
    <rect x="14" y="10" width="12" height="65" rx="3" fill="#e2e8f0"/>
    <rect x="10" y="60" width="20" height="28" rx="4" fill="#fb923c"/>
  </g>

  <!-- India flag accent bar -->
  <rect x="128" y="415" width="85" height="12" rx="6" fill="#FF9933"/>
  <rect x="213" y="415" width="86" height="12" rx="6" fill="#FFFFFF"/>
  <rect x="299" y="415" width="85" height="12" rx="6" fill="#138808"/>
</svg>
